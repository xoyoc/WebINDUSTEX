<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" role="img" aria-label="INDUSTEX — Bordados · Uniformes · EPP">
  <defs>
    <clipPath id="ic">
      <rect x="0" y="5" width="130" height="130" rx="18"/>
    </clipPath>
  </defs>

  <!-- Icono: cuadro azul redondeado -->
  <rect x="0" y="5" width="130" height="130" rx="18" fill="#1B4F8A"/>

  <!-- Triángulo naranja — esquina superior derecha -->
  <polygon points="88,5 130,5 130,56" fill="#F4B41A" clip-path="url(#ic)"/>

  <!-- Doble flecha >> blanca -->
  <polygon points="14,32 38,32 66,70 38,108 14,108 42,70" fill="#FFFFFF" clip-path="url(#ic)"/>
  <polygon points="54,32 78,32 106,70 78,108 54,108 82,70" fill="#FFFFFF" clip-path="url(#ic)"/>

  <!-- Wordmark: INDUS (blanco) + TEX (azul) — versión fondo oscuro -->
  <text font-family="'Montserrat','Arial Black',Arial,sans-serif"
        font-weight="900" font-style="italic" font-size="72" letter-spacing="-2">
    <tspan x="150" y="94" fill="#FFFFFF">INDUS</tspan><tspan fill="#5B9FD4">TEX</tspan>
  </text>

  <!-- Subtítulo -->
  <text x="152" y="122" font-family="'Montserrat',Arial,sans-serif"
        font-weight="600" font-size="15" letter-spacing="0.8">
    <tspan fill="rgba(255,255,255,0.62)">Bordados</tspan>
    <tspan fill="#F4B41A" font-weight="900"> • </tspan>
    <tspan fill="rgba(255,255,255,0.62)">Uniformes</tspan>
    <tspan fill="#F4B41A" font-weight="900"> • </tspan>
    <tspan fill="rgba(255,255,255,0.62)">EPP</tspan>
  </text>
</svg>
